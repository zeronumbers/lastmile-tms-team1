query GetRoutes($where: RouteFilterInput) {
  routes(where: $where) {
    id
    name
    status
    plannedStartTime
    vehicleId
    vehicle {
      registrationPlate
    }
    driverId
    driver {
      user {
        firstName
        lastName
      }
    }
  }
}

query GetRoute($id: UUID!) {
  route(id: $id) {
    id
    name
    status
    plannedStartTime
    actualStartTime
    actualEndTime
    totalDistanceKm
    totalParcelCount
    vehicleId
    vehicle {
      registrationPlate
    }
    driverId
    driver {
      user {
        firstName
        lastName
      }
    }
    createdAt
  }
}

query GetAvailableDrivers($date: DateTime!) {
  availableDrivers(date: $date) {
    id
    name
    shift {
      openTime
      closeTime
    }
    assignedRoutes {
      id
      name
      status
    }
  }
}

mutation CreateRoute(
  $name: String!
  $plannedStartTime: DateTime!
  $totalDistanceKm: Decimal!
  $totalParcelCount: Int!
  $vehicleId: UUID
  $driverId: UUID
) {
  createRoute(
    name: $name
    plannedStartTime: $plannedStartTime
    totalDistanceKm: $totalDistanceKm
    totalParcelCount: $totalParcelCount
    vehicleId: $vehicleId
    driverId: $driverId
  ) {
    id
    name
    status
    plannedStartTime
    totalDistanceKm
    totalParcelCount
    vehicleId
    vehiclePlate
    driverId
    driverName
    createdAt
  }
}

mutation UpdateRoute(
  $id: UUID!
  $name: String!
  $plannedStartTime: DateTime!
  $totalDistanceKm: Decimal!
  $totalParcelCount: Int!
  $vehicleId: UUID
  $driverId: UUID
) {
  updateRoute(
    id: $id
    name: $name
    plannedStartTime: $plannedStartTime
    totalDistanceKm: $totalDistanceKm
    totalParcelCount: $totalParcelCount
    vehicleId: $vehicleId
    driverId: $driverId
  ) {
    id
    name
    status
    plannedStartTime
    totalDistanceKm
    totalParcelCount
    vehicleId
    vehiclePlate
    driverId
    driverName
    createdAt
  }
}

mutation DeleteRoute($id: UUID!) {
  deleteRoute(id: $id)
}

mutation ChangeRouteStatus($id: UUID!, $newStatus: RouteStatus!) {
  changeRouteStatus(id: $id, newStatus: $newStatus) {
    id
    name
    status
    plannedStartTime
    actualStartTime
    actualEndTime
    totalDistanceKm
    totalParcelCount
    vehicleId
    vehiclePlate
    driverId
    driverName
    createdAt
  }
}

mutation AssignDriverToRoute($routeId: UUID!, $driverId: UUID) {
  assignDriverToRoute(routeId: $routeId, driverId: $driverId) {
    id
    name
    status
    driverId
    driverName
    vehicleId
    vehiclePlate
  }
}
