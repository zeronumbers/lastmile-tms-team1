query GetRoutes($where: RouteFilterInput, $order: [RouteSortInput!], $first: Int, $after: String) {
  routes(where: $where, order: $order, first: $first, after: $after) {
    nodes {
      id
      name
      status
      plannedStartTime
      actualStartTime
      actualEndTime
      totalDistanceKm
      totalParcelCount
      zoneId
      zone {
        name
      }
      vehicleId
      vehicle {
        registrationPlate
      }
      driverId
      driver {
        user {
          firstName
          lastName
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

query GetRoute($id: UUID!) {
  route(id: $id) {
    id
    name
    status
    plannedStartTime
    actualStartTime
    actualEndTime
    totalDistanceKm
    totalParcelCount
    zoneId
    zone {
      name
    }
    vehicleId
    vehicle {
      registrationPlate
    }
    driverId
    driver {
      user {
        firstName
        lastName
      }
    }
    routeStops {
      id
      sequenceNumber
      status
      arrivalTime
      departureTime
      estimatedServiceMinutes
      accessInstructions
      street1
      parcels {
        id
        trackingNumber
        status
      }
    }
    createdAt
  }
}

query GetAvailableDrivers($date: DateTime!) {
  availableDrivers(date: $date) {
    id
    name
    shift {
      openTime
      closeTime
    }
    assignedRoutes {
      id
      name
      status
    }
  }
}

query GetRoutesForMap($where: RouteFilterInput, $first: Int) {
  routes(where: $where, first: $first) {
    nodes {
      id
      name
      status
      zoneId
      routeStops {
        id
        sequenceNumber
        status
        geoLocation {
          coordinates
        }
        street1
        parcels {
          id
          trackingNumber
          status
        }
      }
    }
  }
}

